services:
  - type: web
    name: queuecure
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RECEPTIONIST_PIN
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/queuecure.db
