<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Queue Cure '26 — Real-time clinic queue management for receptionists and patients."
    />
    <title>Queue Cure '26</title>
    <script>
      (function () {
        var t = localStorage.getItem('queuecure:theme')
        var dark =
          t === 'dark' ||
          (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
